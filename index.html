/**
 * receipts.js
 * مدیریت دریافت‌ها: ثبت، ویرایش، حذف، جستجو، فیلتر
 */

const Receipts = (() => {
  let currentPage = 1;
  const pageSize = 8;
  let searchTerm = '';
  let unitFilter = '';

  const TYPES = ['شارژ ماهانه', 'بدهی معوق', 'جریمه', 'سایر'];
  const METHODS = { cash: 'نقد', card: 'کارت', transfer: 'انتقال بانکی' };

  function render() {
    const units = DB.getUnits();
    const container = document.getElementById('page-receipts');
    container.innerHTML = `
      <div class="page-header">
        <h4><i class="bi bi-cash-coin"></i> دریافت‌ها</h4>
        <button class="btn btn-primary" id="btnAddReceipt"><i class="bi bi-plus-lg"></i> دریافت جدید</button>
      </div>
      <div class="card mb-3">
        <div class="card-body d-flex flex-wrap gap-2">
          <input type="text" class="form-control" style="max-width:260px" id="receiptSearch" placeholder="جستجو در شرح، شماره سند...">
          <select class="form-select" style="max-width:200px" id="receiptUnitFilter">
            <option value="">همه واحدها</option>
            ${units.map(u => `<option value="${u.id}">${Utils.escapeHtml(Utils.unitLabel(u))}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="card">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead><tr>
              <th>سند</th><th>تاریخ</th><th>واحد</th><th>نوع</th><th>شرح</th><th>مبلغ</th><th>روش</th><th>ثبت‌کننده</th><th>عملیات</th>
            </tr></thead>
            <tbody id="receiptsTableBody"></tbody>
          </table>
        </div>
        <div class="card-footer" id="receiptsPagination"></div>
      </div>
    `;
    document.getElementById('btnAddReceipt').addEventListener('click', () => openModal());
    document.getElementById('receiptSearch').addEventListener('input', Utils.debounce(e => {
      searchTerm = e.target.value.trim(); currentPage = 1; renderTable();
    }, 250));
    document.getElementById('receiptUnitFilter').addEventListener('change', e => {
      unitFilter = e.target.value; currentPage = 1; renderTable();
    });
    renderTable();
  }

  function getFiltered() {
    let list = DB.getReceipts();
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      list = list.filter(r => (r.description || '').toLowerCase().includes(q) || (r.docNo || '').toLowerCase().includes(q));
    }
    if (unitFilter) list = list.filter(r => r.unitId === unitFilter);
    return list.sort((a, b) => new Date(b.date) - new Date(a.date));
  }

  function renderTable() {
    const list = getFiltered();
    const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * pageSize;
    const pageItems = list.slice(start, start + pageSize);
    const tbody = document.getElementById('receiptsTableBody');
    tbody.innerHTML = pageItems.map(r => {
      const unit = DB.getUnitById(r.unitId);
      return `
      <tr>
        <td>${Utils.escapeHtml(r.docNo)}</td>
        <td>${Utils.isoToJalaliDisplay(r.date)}</td>
        <td>${Utils.escapeHtml(unit?.number || '-')}</td>
        <td>${Utils.escapeHtml(r.type || '-')}</td>
        <td>${Utils.escapeHtml(r.description || '-')}</td>
        <td class="text-success fw-bold">${Utils.formatCurrency(r.amount)}</td>
        <td>${METHODS[r.method] || '-'}</td>
        <td>${Utils.escapeHtml(r.registrar || '-')}</td>
        <td class="text-nowrap">
          <button class="btn btn-sm btn-outline-info" title="چاپ رسید" onclick="Receipts.printVoucher('${r.id}')"><i class="bi bi-receipt"></i></button>
          ${r.attachment ? `<button class="btn btn-sm btn-outline-secondary" onclick="Receipts.viewAttachment('${r.id}')"><i class="bi bi-paperclip"></i></button>` : ''}
          <button class="btn btn-sm btn-outline-primary" onclick="Receipts.edit('${r.id}')"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="Receipts.remove('${r.id}')"><i class="bi bi-trash"></i></button>
        </td>
      </tr>`;
    }).join('') || `<tr><td colspan="9" class="text-center text-muted py-4">دریافتی یافت نشد</td></tr>`;

    const pag = document.getElementById('receiptsPagination');
    let pagHtml = `<div class="d-flex justify-content-between align-items-center"><span class="text-muted small">${list.length} سند</span><div class="btn-group">`;
    for (let i = 1; i <= totalPages; i++) {
      pagHtml += `<button class="btn btn-sm ${i === currentPage ? 'btn-primary' : 'btn-outline-primary'}" onclick="Receipts.goToPage(${i})">${Utils.formatNumber(i)}</button>`;
    }
    pagHtml += `</div></div>`;
    pag.innerHTML = pagHtml;
  }

  function goToPage(p) { currentPage = p; renderTable(); }

  function openModal(receipt = null) {
    const isEdit = !!receipt;
    const units = DB.getUnits();
    const modalHtml = `
      <div class="modal fade" id="receiptModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">${isEdit ? 'ویرایش دریافت' : 'ثبت دریافت جدید'}</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <form id="receiptForm">
                <div class="row g-3">
                  <div class="col-md-4"><label class="form-label">تاریخ *</label>
                    ${Utils.renderJalaliDateInput('date', receipt?.date)}</div>
                  <div class="col-md-4"><label class="form-label">واحد *</label>
                    <select class="form-select" name="unitId" required>
                      <option value="">انتخاب کنید</option>
                      ${units.map(u => `<option value="${u.id}" ${receipt?.unitId === u.id ? 'selected' : ''}>${Utils.escapeHtml(Utils.unitLabel(u))}</option>`).join('')}
                    </select></div>
                  <div class="col-md-4"><label class="form-label">نوع دریافت</label>
                    <select class="form-select" name="type">
                      ${TYPES.map(t => `<option ${receipt?.type === t ? 'selected' : ''}>${t}</option>`).join('')}
                    </select></div>
                  <div class="col-12"><label class="form-label">شرح</label>
                    <input class="form-control" name="description" value="${Utils.escapeHtml(receipt?.description || '')}"></div>
                  <div class="col-md-4"><label class="form-label">مبلغ (تومان) *</label>
                    <input class="form-control money-input" name="amount" required value="${receipt?.amount ?? ''}"></div>
                  <div class="col-md-4"><label class="form-label">روش پرداخت</label>
                    <select class="form-select" name="method">
                      <option value="transfer" ${(!receipt || receipt.method === 'transfer') ? 'selected' : ''}>انتقال بانکی</option>
                      <option value="cash" ${receipt?.method === 'cash' ? 'selected' : ''}>نقد</option>
                      <option value="card" ${receipt?.method === 'card' ? 'selected' : ''}>کارت</option>
                    </select></div>
                  <div class="col-md-4"><label class="form-label">شماره پیگیری</label>
                    <input class="form-control" name="trackingNo" value="${Utils.escapeHtml(receipt?.trackingNo || '')}"></div>
                  <div class="col-md-6"><label class="form-label">ثبت‌کننده</label>
                    <input class="form-control" name="registrar" value="${Utils.escapeHtml(receipt?.registrar || '')}"></div>
                  <div class="col-md-6"><label class="form-label">پیوست فایل</label>
                    <input class="form-control" type="file" name="attachmentFile" accept="image/*,.pdf"></div>
                </div>
              </form>
            </div>
            <div class="modal-footer">
              ${isEdit ? `<button type="button" class="btn btn-outline-info me-auto" onclick="Receipts.printVoucher('${receipt.id}')"><i class="bi bi-receipt"></i> چاپ رسید</button>` : ''}
              <button class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
              <button class="btn btn-primary" id="saveReceiptBtn">ذخیره</button>
            </div>
          </div>
        </div>
      </div>`;
    App.mountModal(modalHtml, 'receiptModal');
    Utils.bindAllMoneyInputs(document.getElementById('receiptModal'));
    document.getElementById('saveReceiptBtn').addEventListener('click', () => save(receipt));
  }

  async function save(existing) {
    const form = document.getElementById('receiptForm');
    const fd = new FormData(form);
    const data = Object.fromEntries(fd.entries());
    data.date = Utils.readJalaliDateInput(form, 'date');

    if (!Utils.validateRequired(data.unitId)) { Utils.showToast('انتخاب واحد الزامی است', 'error'); return; }
    data.amount = Utils.parseMoneyValue(data.amount);
    if (!data.amount || data.amount <= 0) { Utils.showToast('مبلغ نامعتبر است', 'error'); return; }

    const file = form.querySelector('[name="attachmentFile"]').files[0];
    if (file) {
      if (file.size > 3 * 1024 * 1024) { Utils.showToast('حجم فایل پیوست نباید بیش از ۳ مگابایت باشد', 'error'); return; }
      data.attachment = await Utils.fileToBase64(file);
    } else if (existing?.attachment) {
      data.attachment = existing.attachment;
    }
    delete data.attachmentFile;

    ['description', 'trackingNo', 'registrar', 'type'].forEach(k => data[k] = Utils.sanitizeInput(data[k]));

    let success;
    if (existing) success = DB.updateReceipt(existing.id, data);
    else success = DB.addReceipt(data);

    if (success) {
      Utils.showToast(existing ? 'دریافت ویرایش شد' : 'دریافت جدید ثبت شد', 'success');
      App.closeModal('receiptModal');
      render();
      Dashboard.refreshStatsIfActive();
    }
  }

  function edit(id) {
    const r = DB.getReceipts().find(x => x.id === id);
    if (r) openModal(r);
  }

  function remove(id) {
    Swal.fire({
      title: 'حذف دریافت', text: 'این سند حذف خواهد شد.', icon: 'warning',
      showCancelButton: true, confirmButtonText: 'حذف', cancelButtonText: 'انصراف', confirmButtonColor: '#dc3545'
    }).then(res => {
      if (res.isConfirmed) {
        DB.deleteReceipt(id);
        Utils.showToast('دریافت حذف شد', 'success');
        renderTable();
        Dashboard.refreshStatsIfActive();
      }
    });
  }

  function viewAttachment(id) {
    const r = DB.getReceipts().find(x => x.id === id);
    if (!r?.attachment) return;
    Swal.fire({
      title: 'پیوست سند',
      html: r.attachment.startsWith('data:image') ? `<img src="${r.attachment}" style="max-width:100%">` : `<a href="${r.attachment}" download target="_blank">دانلود فایل پیوست</a>`,
      width: 600
    });
  }

  /** چاپ رسید دریافت وجه جهت تحویل به پرداخت‌کننده */
  function printVoucher(id) {
    const r = DB.getReceipts().find(x => x.id === id);
    if (!r) { Utils.showToast('رسید یافت نشد', 'error'); return; }
    const unit = DB.getUnitById(r.unitId);
    const s = DB.getSettings();
    const amount = parseFloat(r.amount) || 0;
    const amountWords = `${Utils.numberToPersianWords(amount)} ${s.currency || 'تومان'}`;
    const win = window.open('', '_blank');
    if (!win) { Utils.showToast('مرورگر امکان باز کردن پنجره چاپ را نداد', 'warning'); return; }

    win.document.write(`
      <html dir="rtl" lang="fa"><head><meta charset="utf-8"><title>رسید دریافت وجه</title>
      <style>
        body{font-family:Tahoma,Arial,sans-serif;padding:24px;color:#111;background:#fff}
        .voucher{max-width:640px;margin:auto;border:2px solid #333;border-radius:12px;padding:26px}
        .voucher-header{text-align:center;border-bottom:2px dashed #999;padding-bottom:14px;margin-bottom:16px}
        .voucher-header h2{margin:0 0 6px;font-size:20px}
        .voucher-header div{font-size:13px;color:#444}
        .voucher-header h3{margin-top:14px;font-size:17px;background:#f0f0f0;display:inline-block;padding:6px 18px;border-radius:20px}
        .row{display:flex;justify-content:space-between;padding:8px 2px;border-bottom:1px dotted #ccc;font-size:14px}
        .label{color:#555;font-weight:bold}
        .amount-box{background:#f7f7f7;border:1px solid #ccc;border-radius:10px;padding:14px;margin:16px 0;text-align:center}
        .amount-box .amt{font-size:20px;font-weight:bold;color:#111}
        .amount-box .words{font-size:13px;color:#333;margin-top:6px}
        .sign{display:flex;justify-content:space-between;margin-top:60px}
        .sign div{width:44%;text-align:center;border-top:1px solid #333;padding-top:8px;font-size:13px;color:#444}
        .doc-no{position:absolute;top:26px;left:26px;font-size:13px;color:#666}
        @media print { .no-print{display:none} }
      </style></head>
      <body>
      <div class="voucher">
        <div class="voucher-header">
          ${s.logo ? `<img src="${s.logo}" style="height:50px;border-radius:8px;margin-bottom:8px">` : ''}
          <h2>${Utils.escapeHtml(s.buildingName || 'ساختمان')}</h2>
          <div>${Utils.escapeHtml(s.address || '')}</div>
          <div>${s.phone ? 'تلفن تماس: ' + Utils.escapeHtml(s.phone) : ''}</div>
          <h3>رسید دریافت وجه</h3>
        </div>
        <div class="row"><span class="label">شماره رسید:</span><span>${Utils.escapeHtml(r.docNo)}</span></div>
        <div class="row"><span class="label">تاریخ:</span><span>${Utils.isoToJalaliDisplay(r.date)}</span></div>
        <div class="row"><span class="label">دریافت شده از:</span><span>${Utils.escapeHtml(unit?.owner || unit?.tenant || '-')} (واحد ${Utils.escapeHtml(unit?.number || '-')})</span></div>
        <div class="row"><span class="label">بابت:</span><span>${Utils.escapeHtml(r.description || r.type || '-')}</span></div>
        <div class="row"><span class="label">روش پرداخت:</span><span>${METHODS[r.method] || '-'}</span></div>
        ${r.trackingNo ? `<div class="row"><span class="label">شماره پیگیری:</span><span>${Utils.escapeHtml(r.trackingNo)}</span></div>` : ''}
        <div class="amount-box">
          <div class="amt">مبلغ: ${Utils.formatCurrency(amount, s.currency)}</div>
          <div class="words">(${amountWords})</div>
        </div>
        <div class="row"><span class="label">ثبت‌کننده:</span><span>${Utils.escapeHtml(r.registrar || '-')}</span></div>
        <div class="sign">
          <div>امضای دریافت‌کننده (مدیر ساختمان)</div>
          <div>امضای پرداخت‌کننده</div>
        </div>
      </div>
      <div class="no-print" style="text-align:center;margin-top:20px">
        <button onclick="window.print()" style="padding:8px 20px;font-size:14px;cursor:pointer">چاپ رسید</button>
      </div>
      </body></html>
    `);
    win.document.close();
    win.focus();
    setTimeout(() => win.print(), 350);
  }

  return { render, renderTable, goToPage, edit, remove, viewAttachment, printVoucher };
})();


/* ================= js/expenses.js ================= */
/**
 * expenses.js
 * مدیریت هزینه‌ها: ثبت، ویرایش، حذف، جستجو، فیلتر
 */

const Expenses = (() => {
  let currentPage = 1;
  const pageSize = 8;
  let searchTerm = '';
  let categoryFilter = '';

  const CATEGORIES = ['نگهبانی', 'نظافت', 'تعمیرات', 'آب', 'برق', 'گاز', 'آسانسور', 'فضای سبز', 'حقوق', 'اداری', 'سایر'];

  function render() {
    const container = document.getElementById('page-expenses');
    container.innerHTML = `
      <div class="page-header">
        <h4><i class="bi bi-receipt-cutoff"></i> هزینه‌ها</h4>
        <button class="btn btn-primary" id="btnAddExpense"><i class="bi bi-plus-lg"></i> هزینه جدید</button>
      </div>
      <div class="card mb-3">
        <div class="card-body d-flex flex-wrap gap-2">
          <input type="text" class="form-control" style="max-width:260px" id="expenseSearch" placeholder="جستجو در شرح، شماره سند...">
          <select class="form-select" style="max-width:200px" id="expenseCategoryFilter">
            <option value="">همه دسته‌ها</option>
            ${CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="card">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead><tr>
              <th>سند</th><th>تاریخ</th><th>دسته</th><th>شرح</th><th>مبلغ</th><th>پرداخت به</th><th>شماره فاکتور</th><th>ثبت‌کننده</th><th>عملیات</th>
            </tr></thead>
            <tbody id="expensesTableBody"></tbody>
          </table>
        </div>
        <div class="card-footer" id="expensesPagination"></div>
      </div>
    `;
    document.getElementById('btnAddExpense').addEventListener('click', () => openModal());
    document.getElementById('expenseSearch').addEventListener('input', Utils.debounce(e => {
      searchTerm = e.target.value.trim(); currentPage = 1; renderTable();
    }, 250));
    document.getElementById('expenseCategoryFilter').addEventListener('change', e => {
      categoryFilter = e.target.value; currentPage = 1; renderTable();
    });
    renderTable();
  }

  function getFiltered() {
    let list = DB.getExpenses();
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      list = list.filter(e => (e.description || '').toLowerCase().includes(q) || (e.docNo || '').toLowerCase().includes(q));
    }
    if (categoryFilter) list = list.filter(e => e.category === categoryFilter);
    return list.sort((a, b) => new Date(b.date) - new Date(a.date));
  }

  function renderTable() {
    const list = getFiltered();
    const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * pageSize;
    const pageItems = list.slice(start, start + pageSize);
    const tbody = document.getElementById('expensesTableBody');
    tbody.innerHTML = pageItems.map(e => `
      <tr>
        <td>${Utils.escapeHtml(e.docNo)}</td>
        <td>${Utils.isoToJalaliDisplay(e.date)}</td>
        <td>${Utils.escapeHtml(e.category || '-')}</td>
        <td>${Utils.escapeHtml(e.description || '-')}</td>
        <td class="text-danger fw-bold">${Utils.formatCurrency(e.amount)}</td>
        <td>${Utils.escapeHtml(e.payTo || '-')}</td>
        <td>${Utils.escapeHtml(e.invoiceNo || '-')}</td>
        <td>${Utils.escapeHtml(e.registrar || '-')}</td>
        <td class="text-nowrap">
          ${e.attachment ? `<button class="btn btn-sm btn-outline-secondary" onclick="Expenses.viewAttachment('${e.id}')"><i class="bi bi-paperclip"></i></button>` : ''}
          <button class="btn btn-sm btn-outline-primary" onclick="Expenses.edit('${e.id}')"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="Expenses.remove('${e.id}')"><i class="bi bi-trash"></i></button>
        </td>
      </tr>`).join('') || `<tr><td colspan="9" class="text-center text-muted py-4">هزینه‌ای یافت نشد</td></tr>`;

    const pag = document.getElementById('expensesPagination');
    let pagHtml = `<div class="d-flex justify-content-between align-items-center"><span class="text-muted small">${list.length} سند</span><div class="btn-group">`;
    for (let i = 1; i <= totalPages; i++) {
      pagHtml += `<button class="btn btn-sm ${i === currentPage ? 'btn-primary' : 'btn-outline-primary'}" onclick="Expenses.goToPage(${i})">${Utils.formatNumber(i)}</button>`;
    }
    pagHtml += `</div></div>`;
    pag.innerHTML = pagHtml;
  }

  function goToPage(p) { currentPage = p; renderTable(); }

  function openModal(expense = null, onSaved = null) {
    const isEdit = !!expense;
    const modalHtml = `
      <div class="modal fade" id="expenseModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">${isEdit ? 'ویرایش هزینه' : 'ثبت هزینه جدید'}</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <form id="expenseForm">
                <div class="row g-3">
                  <div class="col-md-4"><label class="form-label">تاریخ *</label>
                    ${Utils.renderJalaliDateInput('date', expense?.date)}</div>
                  <div class="col-md-4"><label class="form-label">دسته هزینه *</label>
                    <select class="form-select" name="category" required>
                      <option value="">انتخاب کنید</option>
                      ${CATEGORIES.map(c => `<option ${expense?.category === c ? 'selected' : ''}>${c}</option>`).join('')}
                    </select></div>
                  <div class="col-md-4"><label class="form-label">مبلغ (تومان) *</label>
                    <input class="form-control money-input" name="amount" required value="${expense?.amount ?? ''}"></div>
                  <div class="col-12"><label class="form-label">شرح</label>
                    <input class="form-control" name="description" value="${Utils.escapeHtml(expense?.description || '')}"></div>
                  <div class="col-md-6"><label class="form-label">پرداخت به</label>
                    <input class="form-control" name="payTo" value="${Utils.escapeHtml(expense?.payTo || '')}"></div>
                  <div class="col-md-6"><label class="form-label">شماره فاکتور</label>
                    <input class="form-control" name="invoiceNo" value="${Utils.escapeHtml(expense?.invoiceNo || '')}"></div>
                  <div class="col-md-6"><label class="form-label">ثبت‌کننده</label>
                    <input class="form-control" name="registrar" value="${Utils.escapeHtml(expense?.registrar || '')}"></div>
                  <div class="col-md-6"><label class="form-label">پیوست فایل</label>
                    <input class="form-control" type="file" name="attachmentFile" accept="image/*,.pdf"></div>
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
              <button class="btn btn-primary" id="saveExpenseBtn">ذخیره</button>
            </div>
          </div>
        </div>
      </div>`;
    App.mountModal(modalHtml, 'expenseModal');
    Utils.bindAllMoneyInputs(document.getElementById('expenseModal'));
    document.getElementById('saveExpenseBtn').addEventListener('click', () => save(expense, onSaved));
  }

  async function save(existing, onSaved) {
    const form = document.getElementById('expenseForm');
    const fd = new FormData(form);
    const data = Object.fromEntries(fd.entries());
    data.date = Utils.readJalaliDateInput(form, 'date');

    if (!Utils.validateRequired(data.category)) { Utils.showToast('انتخاب دسته هزینه الزامی است', 'error'); return; }
    data.amount = Utils.parseMoneyValue(data.amount);
    if (!data.amount || data.amount <= 0) { Utils.showToast('مبلغ نامعتبر است', 'error'); return; }

    const file = form.querySelector('[name="attachmentFile"]').files[0];
    if (file) {
      if (file.size > 3 * 1024 * 1024) { Utils.showToast('حجم فایل پیوست نباید بیش از ۳ مگابایت باشد', 'error'); return; }
      data.attachment = await Utils.fileToBase64(file);
    } else if (existing?.attachment) {
      data.attachment = existing.attachment;
    }
    delete data.attachmentFile;

    ['description', 'payTo', 'invoiceNo', 'registrar'].forEach(k => data[k] = Utils.sanitizeInput(data[k]));

    let success;
    if (existing) success = DB.updateExpense(existing.id, data);
    else success = DB.addExpense(data);

    if (success) {
      Utils.showToast(existing ? 'هزینه ویرایش شد' : 'هزینه جدید ثبت شد', 'success');
      App.closeModal('expenseModal');
      render();
      Dashboard.refreshStatsIfActive();
      if (typeof onSaved === 'function') onSaved();
    }
  }

  function edit(id) {
    const e = DB.getExpenses().find(x => x.id === id);
    if (e) openModal(e);
  }

  function remove(id) {
    Swal.fire({
      title: 'حذف هزینه', text: 'این سند حذف خواهد شد.', icon: 'warning',
      showCancelButton: true, confirmButtonText: 'حذف', cancelButtonText: 'انصراف', confirmButtonColor: '#dc3545'
    }).then(res => {
      if (res.isConfirmed) {
        DB.deleteExpense(id);
        Utils.showToast('هزینه حذف شد', 'success');
        renderTable();
        Dashboard.refreshStatsIfActive();
      }
    });
  }

  function viewAttachment(id) {
    const e = DB.getExpenses().find(x => x.id === id);
    if (!e?.attachment) return;
    Swal.fire({
      title: 'پیوست سند',
      html: e.attachment.startsWith('data:image') ? `<img src="${e.attachment}" style="max-width:100%">` : `<a href="${e.attachment}" download target="_blank">دانلود فایل پیوست</a>`,
      width: 600
    });
  }

  return { render, renderTable, goToPage, edit, remove, viewAttachment };
})();


/* ================= js/charges.js ================= */
/**
 * charges.js
 * صدور و مدیریت اسناد شارژ ماهانه برای واحدها
 * هر سند شارژ، بر اساس فیلد «سهم شارژ» ثبت‌شده در مشخصات واحد، به‌عنوان یک سند بدهکار
 * در دفتر معین همان واحد درج می‌شود (به‌صورت جدا از هزینه‌ها).
 */

const Charges = (() => {
  let currentPage = 1;
  const pageSize = 8;
  let searchTerm = '';
  let unitFilter = '';

  function render() {
    const units = DB.getUnits();
    const t = Utils.todayJalali();
    const container = document.getElementById('page-charges');

    const yearOptions = [];
    for (let y = t.jy - 2; y <= t.jy + 1; y++) {
      yearOptions.push(`<option value="${y}" ${y === t.jy ? 'selected' : ''}>${Utils.toPersianDigits(y)}</option>`);
    }
    const monthOptions = Utils.PERSIAN_MONTHS.map((mn, i) =>
      `<option value="${i + 1}" ${(i + 1) === t.jm ? 'selected' : ''}>${mn}</option>`).join('');

    container.innerHTML = `
      <div class="page-header"><h4><i class="bi bi-calendar2-check"></i> شارژ ماهانه</h4></div>

      <div class="card mb-3">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label">سال</label>
              <select class="form-select" id="chargeYear">${yearOptions.join('')}</select>
            </div>
            <div class="col-md-3">
              <label class="form-label">ماه</label>
              <select class="form-select" id="chargeMonth">${monthOptions}</select>
            </div>
            <div class="col-md-6">
              <button class="btn btn-primary w-100" id="btnGenerateCharge">
                <i class="bi bi-lightning-charge"></i> صدور شارژ برای واحدهای فعال
              </button>
            </div>
          </div>
          <div class="form-text mt-2">
            مبلغ هر واحد بر اساس فیلد «سهم شارژ (ماهانه)» ثبت‌شده در مشخصات همان واحد محاسبه می‌شود.
            اگر شارژ این ماه قبلاً برای واحدی صادر شده باشد، دوباره صادر نخواهد شد.
          </div>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-body d-flex flex-wrap gap-2">
          <input type="text" class="form-control" style="max-width:260px" id="chargeSearch" placeholder="جستجو در شماره سند یا شماره واحد...">
          <select class="form-select" style="max-width:200px" id="chargeUnitFilter">
            <option value="">همه واحدها</option>
            ${units.map(u => `<option value="${u.id}">${Utils.escapeHtml(Utils.unitLabel(u))}</option>`).join('')}
          </select>
        </div>
      </div>

      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
          <span>اسناد شارژ صادرشده</span>
          <div class="btn-group">
            <button class="btn btn-sm btn-outline-success" onclick="Charges.exportExcel()"><i class="bi bi-file-earmark-excel"></i> Excel</button>
            <button class="btn btn-sm btn-outline-secondary" onclick="Charges.exportCsv()"><i class="bi bi-filetype-csv"></i> CSV</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0" id="chargesTable">
            <thead><tr><th>شماره سند</th><th>تاریخ</th><th>واحد</th><th>دوره</th><th>مبلغ</th><th>عملیات</th></tr></thead>
            <tbody id="chargesTableBody"></tbody>
          </table>
        </div>
        <div class="card-footer" id="chargesPagination"></div>
      </div>
    `;

    document.getElementById('btnGenerateCharge').addEventListener('click', handleGenerateClick);
    document.getElementById('chargeSearch').addEventListener('input', Utils.debounce(e => {
      searchTerm = e.target.value.trim(); currentPage = 1; renderTable();
    }, 250));
    document.getElementById('chargeUnitFilter').addEventListener('change', e => {
      unitFilter = e.target.value; currentPage = 1; renderTable();
    });

    renderTable();
  }

  function handleGenerateClick() {
    const jy = parseInt(document.getElementById('chargeYear').value);
    const jm = parseInt(document.getElementById('chargeMonth').value);
    const units = DB.getUnits().filter(u => u.status !== 'inactive');
    const monthLabel = `${Utils.jalaliMonthName(jm)} ${Utils.toPersianDigits(jy)}`;

    if (!units.length) { Utils.showToast('هیچ واحد فعالی برای صدور شارژ وجود ندارد', 'warning'); return; }

    Swal.fire({
      title: 'صدور شارژ ماهانه',
      text: `آیا شارژ دوره «${monthLabel}» برای ${units.length} واحد فعال صادر شود؟`,
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'بله، صادر شود',
      cancelButtonText: 'انصراف'
    }).then(res => {
      if (res.isConfirmed) generate(jy, jm, monthLabel);
    });
  }

  function generate(jy, jm, monthLabel) {
    const units = DB.getUnits().filter(u => u.status !== 'inactive');
    const dateIso = Utils.jalaliToIso(jy, jm, 1);
    let created = 0, skippedExisting = 0, skippedZero = 0;

    units.forEach(u => {
      if (DB.hasChargeForUnitMonth(u.id, jy, jm)) { skippedExisting++; return; }
      const amount = parseFloat(u.chargeShare) || 0;
      if (amount <= 0) { skippedZero++; return; }
      DB.addCharge({
        unitId: u.id,
        jy, jm,
        date: dateIso,
        amount,
        description: `شارژ ماهانه ${monthLabel} - واحد ${u.number}`
      });
      created++;
    });

    let msg = `${Utils.formatNumber(created)} سند شارژ صادر شد.`;
    if (skippedExisting) msg += ` (${Utils.formatNumber(skippedExisting)} واحد قبلاً برای این ماه شارژ داشتند)`;
    if (skippedZero) msg += ` (${Utils.formatNumber(skippedZero)} واحد فاقد سهم شارژ بودند)`;
    Utils.showToast(msg, created ? 'success' : 'warning');

    renderTable();
    Dashboard.refreshStatsIfActive();
  }

  function getFiltered() {
    let list = DB.getCharges();
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      list = list.filter(c => {
        const unit = DB.getUnitById(c.unitId);
        return (c.docNo || '').toLowerCase().includes(q) || (unit?.number || '').toLowerCase().includes(q);
      });
    }
    if (unitFilter) list = list.filter(c => c.unitId === unitFilter);
    return list.sort((a, b) => new Date(b.date) - new Date(a.date));
  }

  function renderTable() {
    const list = getFiltered();
    const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * pageSize;
    const pageItems = list.slice(start, start + pageSize);
    const tbody = document.getElementById('chargesTableBody');

    tbody.innerHTML = pageItems.map(c => {
      const unit = DB.getUnitById(c.unitId);
      const period = `${Utils.jalaliMonthName(c.jm)} ${Utils.toPersianDigits(c.jy)}`;
      return `
      <tr>
        <td>${Utils.escapeHtml(c.docNo)}</td>
        <td>${Utils.isoToJalaliDisplay(c.date)}</td>
        <td>${Utils.escapeHtml(unit?.number || '-')}</td>
        <td>${period}</td>
        <td class="text-danger fw-bold">${Utils.formatCurrency(c.amount)}</td>
        <td><button class="btn btn-sm btn-outline-danger" onclick="Charges.remove('${c.id}')"><i class="bi bi-trash"></i></button></td>
      </tr>`;
    }).join('') || `<tr><td colspan="6" class="text-center text-muted py-4">سند شارژی ثبت نشده است</td></tr>`;

    const pag = document.getElementById('chargesPagination');
    let pagHtml = `<div class="d-flex justify-content-between align-items-center"><span class="text-muted small">${list.length} سند</span><div class="btn-group">`;
    for (let i = 1; i <= totalPages; i++) {
      pagHtml += `<button class="btn btn-sm ${i === currentPage ? 'btn-primary' : 'btn-outline-primary'}" onclick="Charges.goToPage(${i})">${Utils.formatNumber(i)}</button>`;
    }
    pagHtml += `</div></div>`;
    pag.innerHTML = pagHtml;
  }

  function goToPage(p) { currentPage = p; renderTable(); }

  function remove(id) {
    Swal.fire({
      title: 'حذف سند شارژ',
      text: 'این سند از دفتر معین واحد مربوطه حذف خواهد شد.',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: 'حذف',
      cancelButtonText: 'انصراف',
      confirmButtonColor: '#dc3545'
    }).then(res => {
      if (res.isConfirmed) {
        DB.deleteCharge(id);
        Utils.showToast('سند شارژ حذف شد', 'success');
        renderTable();
        Dashboard.refreshStatsIfActive();
      }
    });
  }

  function exportExcel() {
    const table = document.getElementById('chargesTable');
    if (!table) return;
    const wb = XLSX.utils.table_to_book(table, { sheet: 'شارژ ماهانه' });
    XLSX.writeFile(wb, `اسناد-شارژ-${Date.now()}.xlsx`);
  }

  function exportCsv() {
    const table = document.getElementById('chargesTable');
    if (!table) return;
    const wb = XLSX.utils.table_to_book(table, { sheet: 'شارژ ماهانه' });
    const csv = XLSX.utils.sheet_to_csv(wb.Sheets['شارژ ماهانه']);
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `اسناد-شارژ-${Date.now()}.csv`;
    link.click();
  }

  return { render, renderTable, goToPage, remove, exportExcel, exportCsv };
})();


/* ================= js/reports.js ================= */
/**
 * reports.js
 * گزارشات مختلف سیستم + خروجی Excel/CSV/PDF/Print
 */

const Reports = (() => {
  let reportChart;

  const REPORT_TYPES = [
    { key: 'general', label: 'گزارش کلی' },
    { key: 'units', label: 'گزارش واحدها' },
    { key: 'receipts', label: 'گزارش دریافت‌ها' },
    { key: 'expenses', label: 'گزارش هزینه‌ها' },
    { key: 'balances', label: 'گزارش مانده هر واحد' },
    { key: 'fund', label: 'گزارش صندوق' },
    { key: 'debtors', label: 'گزارش بدهکاران' },
    { key: 'creditors', label: 'گزارش بستانکاران' },
    { key: 'byExpenseCategory', label: 'گزارش بر اساس نوع هزینه' },
    { key: 'byReceiptType', label: 'گزارش بر اساس نوع دریافت' }
  ];

  function render() {
    const units = DB.getUnits();
    const container = document.getElementById('page-reports');
    container.innerHTML = `
      <div class="page-header"><h4><i class="bi bi-bar-chart-line"></i> گزارشات</h4></div>
      <div class="card mb-3">
        <div class="card-body d-flex flex-wrap gap-2 align-items-end">
          <div>
            <label class="form-label">نوع گزارش</label>
            <select class="form-select" id="reportType">
              ${REPORT_TYPES.map(r => `<option value="${r.key}">${r.label}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="form-label">از تاریخ</label>
            ${Utils.renderJalaliDateInput('fromDate', null)}
          </div>
          <div>
            <label class="form-label">تا تاریخ</label>
            ${Utils.renderJalaliDateInput('toDate', null)}
          </div>
          <div>
            <label class="form-label">واحد</label>
            <select class="form-select" id="reportUnitFilter">
              <option value="">همه واحدها</option>
              ${units.map(u => `<option value="${u.id}">${Utils.escapeHtml(Utils.unitLabel(u))}</option>`).join('')}
            </select>
          </div>
          <button class="btn btn-primary" id="btnRunReport"><i class="bi bi-play-fill"></i> تولید گزارش</button>
        </div>
      </div>
      <div id="reportOutput"></div>
    `;
    document.getElementById('btnRunReport').addEventListener('click', runReport);
    runReport();
  }

  function getDateRange() {
    const container = document.getElementById('page-reports');
    let from = null, to = null;
    try { from = Utils.readJalaliDateInput(container, 'fromDate'); } catch (e) {}
    try { to = Utils.readJalaliDateInput(container, 'toDate'); } catch (e) {}
    return { from, to };
  }

  function inRange(dateStr, from, to) {
    const d = new Date(dateStr);
    if (from && d < new Date(from)) return false;
    if (to && d > new Date(to)) return false;
    return true;
  }

  function runReport() {
    const type = document.getElementById('reportType').value;
    const unitId = document.getElementById('reportUnitFilter').value;
    const { from, to } = getDateRange();
    const output = document.getElementById('reportOutput');

    const units = DB.getUnits();
    let receipts = DB.getReceipts().filter(r => inRange(r.date, from, to));
    let expenses = DB.getExpenses().filter(e => inRange(e.date, from, to));
    if (unitId) receipts = receipts.filter(r => r.unitId === unitId);

    let html = '';
    switch (type) {
      case 'units': html = reportUnits(units); break;
      case 'receipts': html = reportList('دریافت‌ها', receipts, ['docNo', 'date', 'description', 'amount'], ['شماره سند', 'تاریخ', 'شرح', 'مبلغ']); break;
      case 'expenses': html = reportList('هزینه‌ها', expenses, ['docNo', 'date', 'description', 'amount'], ['شماره سند', 'تاریخ', 'شرح', 'مبلغ']); break;
      case 'balances': html = reportBalances(units); break;
      case 'fund': html = reportFund(receipts, expenses); break;
      case 'debtors': html = reportDebtCredit(units, true); break;
      case 'creditors': html = reportDebtCredit(units, false); break;
      case 'byExpenseCategory': html = reportGrouped(expenses, 'category', 'دسته هزینه'); break;
      case 'byReceiptType': html = reportGrouped(receipts, 'type', 'نوع دریافت'); break;
      default: html = reportGeneral(units, receipts, expenses);
    }

    output.innerHTML = `
      <div class="card" id="reportCard">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>${REPORT_TYPES.find(r => r.key === type)?.label}</span>
          <div class="btn-group">
            <button class="btn btn-sm btn-outline-success" onclick="Reports.exportExcel()"><i class="bi bi-file-earmark-excel"></i> Excel</button>
            <button class="btn btn-sm btn-outline-secondary" onclick="Reports.exportCsv()"><i class="bi bi-filetype-csv"></i> CSV</button>
            <button class="btn btn-sm btn-outline-primary" onclick="Reports.printElement('reportBody')"><i class="bi bi-printer"></i> چاپ</button>
            <button class="btn btn-sm btn-outline-danger" onclick="Reports.exportPdf('reportBody','report')"><i class="bi bi-file-earmark-pdf"></i> PDF</button>
          </div>
        </div>
        <div class="card-body" id="reportBody">${html}</div>
      </div>`;
  }

  function summaryBar(count, total) {
    return `<div class="d-flex gap-4 mb-3">
      <div><strong>تعداد رکورد:</strong> ${Utils.formatNumber(count)}</div>
      ${total !== undefined ? `<div><strong>جمع کل:</strong> ${Utils.formatCurrency(total)}</div>` : ''}
    </div>`;
  }

  function reportGeneral(units, receipts, expenses) {
    const totalIncome = receipts.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
    const totalExpense = expenses.reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
    return `
      ${summaryBar(units.length)}
      <div class="row g-3">
        <div class="col-md-4"><div class="stat-card"><div class="stat-label">تعداد واحدها</div><div class="stat-value">${Utils.formatNumber(units.length)}</div></div></div>
        <div class="col-md-4"><div class="stat-card"><div class="stat-label">جمع دریافت‌ها</div><div class="stat-value">${Utils.formatCurrency(totalIncome)}</div></div></div>
        <div class="col-md-4"><div class="stat-card"><div class="stat-label">جمع هزینه‌ها</div><div class="stat-value">${Utils.formatCurrency(totalExpense)}</div></div></div>
      </div>`;
  }

  function reportUnits(units) {
    return `${summaryBar(units.length)}
      <table class="table table-bordered" id="reportTable">
        <thead><tr><th>کد</th><th>واحد</th><th>طبقه</th><th>بلوک</th><th>مالک</th><th>سهم شارژ</th><th>وضعیت</th></tr></thead>
        <tbody>${units.map(u => `<tr><td>${Utils.escapeHtml(u.code || '-')}</td><td>${Utils.escapeHtml(u.number)}</td><td>${Utils.escapeHtml(u.floor || '-')}</td><td>${Utils.escapeHtml(u.block || '-')}</td><td>${Utils.escapeHtml(u.owner || '-')}</td><td>${Utils.formatNumber(u.chargeShare)}</td><td>${u.status === 'inactive' ? 'غیرفعال' : 'فعال'}</td></tr>`).join('')}</tbody>
      </table>`;
  }

  function reportList(title, list, fields, headers) {
    const total = list.reduce((s, i) => s + (parseFloat(i.amount) || 0), 0);
    return `${summaryBar(list.length, total)}
      <table class="table table-bordered" id="reportTable">
        <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${list.map(item => `<tr>${fields.map(f => `<td>${f === 'date' ? Utils.isoToJalaliDisplay(item[f]) : f === 'amount' ? Utils.formatCurrency(item[f]) : Utils.escapeHtml(item[f] || '-')}</td>`).join('')}</tr>`).join('') || `<tr><td colspan="${headers.length}" class="text-center text-muted">داده‌ای موجود نیست</td></tr>`}</tbody>
      </table>`;
  }

  function reportBalances(units) {
    const balances = Ledger.getAllBalances();
    return `${summaryBar(units.length)}
      <table class="table table-bordered" id="reportTable">
        <thead><tr><th>واحد</th><th>مالک</th><th>مانده</th><th>وضعیت</th></tr></thead>
        <tbody>${units.map(u => {
          const b = balances[u.id] || 0;
          return `<tr><td>${Utils.escapeHtml(u.number)}</td><td>${Utils.escapeHtml(u.owner || '-')}</td><td>${Utils.formatCurrency(Math.abs(b))}</td><td>${b > 0 ? 'بدهکار' : b < 0 ? 'بستانکار' : 'تسویه'}</td></tr>`;
        }).join('')}</tbody>
      </table>`;
  }

  function reportDebtCredit(units, debtors) {
    const balances = Ledger.getAllBalances();
    const filtered = units.filter(u => debtors ? (balances[u.id] || 0) > 0 : (balances[u.id] || 0) < 0);
    const total = filtered.reduce((s, u) => s + Math.abs(balances[u.id] || 0), 0);
    return `${summaryBar(filtered.length, total)}
      <table class="table table-bordered" id="reportTable">
        <thead><tr><th>واحد</th><th>مالک</th><th>شماره تماس</th><th>مبلغ</th></tr></thead>
        <tbody>${filtered.map(u => `<tr><td>${Utils.escapeHtml(u.number)}</td><td>${Utils.escapeHtml(u.owner || '-')}</td><td>${Utils.escapeHtml(u.phone || '-')}</td><td>${Utils.formatCurrency(Math.abs(balances[u.id]))}</td></tr>`).join('') || `<tr><td colspan="4" class="text-center text-muted">موردی یافت نشد</td></tr>`}</tbody>
      </table>`;
  }

  function reportFund(receipts, expenses) {
    const totalIncome = receipts.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
    const totalExpense = expenses.reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
    return `
      <div class="row g-3">
        <div class="col-md-4"><div class="stat-card"><div class="stat-label">جمع درآمد</div><div class="stat-value text-success">${Utils.formatCurrency(totalIncome)}</div></div></div>
        <div class="col-md-4"><div class="stat-card"><div class="stat-label">جمع هزینه</div><div class="stat-value text-danger">${Utils.formatCurrency(totalExpense)}</div></div></div>
        <div class="col-md-4"><div class="stat-card"><div class="stat-label">مانده صندوق</div><div class="stat-value">${Utils.formatCurrency(totalIncome - totalExpense)}</div></div></div>
      </div>`;
  }

  function reportGrouped(list, field, label) {
    const map = {};
    list.forEach(i => { const k = i[field] || 'نامشخص'; map[k] = (map[k] || 0) + (parseFloat(i.amount) || 0); });
    const keys = Object.keys(map);
    const total = Object.values(map).reduce((a, b) => a + b, 0);
    setTimeout(() => drawGroupChart(keys, keys.map(k => map[k])), 0);
    return `${summaryBar(list.length, total)}
      <div class="row">
        <div class="col-md-6">
          <table class="table table-bordered" id="reportTable">
            <thead><tr><th>${label}</th><th>مبلغ</th></tr></thead>
            <tbody>${keys.map(k => `<tr><td>${Utils.escapeHtml(k)}</td><td>${Utils.formatCurrency(map[k])}</td></tr>`).join('') || `<tr><td colspan="2" class="text-center text-muted">داده‌ای موجود نیست</td></tr>`}</tbody>
          </table>
        </div>
        <div class="col-md-6"><canvas id="groupedChart" height="220"></canvas></div>
      </div>`;
  }

  function drawGroupChart(labels, data) {
    const canvas = document.getElementById('groupedChart');
    if (!canvas) return;
    if (reportChart) reportChart.destroy();
    reportChart = new Chart(canvas, {
      type: 'pie',
      data: { labels, datasets: [{ data, backgroundColor: ['#2563eb', '#22c55e', '#ef4444', '#f59e0b', '#a855f7', '#06b6d4', '#84cc16', '#f97316'] }] },
      options: { plugins: { legend: { position: 'bottom' } } }
    });
  }

  /* ------------------ خروجی‌ها ------------------ */
  function exportExcel() {
    const table = document.getElementById('reportTable');
    if (!table) { Utils.showToast('جدولی برای خروجی وجود ندارد', 'warning'); return; }
    const wb = XLSX.utils.table_to_book(table, { sheet: 'گزارش' });
    XLSX.writeFile(wb, `گزارش-${Date.now()}.xlsx`);
  }

  function exportCsv() {
    const table = document.getElementById('reportTable');
    if (!table) { Utils.showToast('جدولی برای خروجی وجود ندارد', 'warning'); return; }
    const wb = XLSX.utils.table_to_book(table, { sheet: 'گزارش' });
    const csv = XLSX.utils.sheet_to_csv(wb.Sheets['گزارش']);
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `گزارش-${Date.now()}.csv`;
    link.click();
  }

  function printElement(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const win = window.open('', '_blank');
    win.document.write(`<html dir="rtl" lang="fa"><head><meta charset="utf-8"><title>چاپ گزارش</title>
      <style>body{font-family:Tahoma,sans-serif;padding:20px} table{width:100%;border-collapse:collapse} td,th{border:1px solid #999;padding:6px;text-align:right}</style>
      </head><body>${el.innerHTML}</body></html>`);
    win.document.close();
    win.focus();
    setTimeout(() => win.print(), 300);
  }

  function exportPdf(id, filename) {
    const el = document.getElementById(id);
    if (!el) return;
    html2pdf().set({ margin: 10, filename: `${filename || 'report'}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(el).save();
  }

  return { render, exportExcel, exportCsv, printElement, exportPdf };
})();

/**

const Settings = (() => {

      <div class="card">
        <div class="card-body">
          <form id="settingsForm">
            <div class="row g-3">

                <input class="form-control" name="manager" value="${Utils.escapeHtml(s.manager || '')}"></div>

              <div class="col-md-4"><label class="form-label">واحد پول</label>
                <select class="form-select" name="currency">
                  <option value="تومان" ${s.currency === 'تومان' ? 'selected' : ''}>تومان</option>

                </select></div>
              <div class="col-md-4"><label class="form-label">رنگ اصلی</label>
                <input class="form-control form-control-color" type="color" name="primaryColor" value="${s.primaryColor || '#2563eb'}"></div>
              <div class="col-md-4"><label class="form-label">حالت نمایش</label>
                <select class="form-select" name="theme">
                  <option value="light" ${s.theme === 'light' ? 'selected' : ''}>روشن</option>
                  <option value="dark" ${s.theme === 'dark' ? 'selected' : ''}>تیره</option>
                </select></div>
              <div class="col-md-6"><label class="form-label">لوگوی ساختمان</label>
                <input class="form-control" type="file" name="logoFile" accept="image/*">
                ${s.logo ? `<img src="${s.logo}" class="mt-2" style="height:60px;border-radius:8px">` : ''}</div>
            </div>
            <button type="button" class="btn btn-primary mt-4" id="saveSettingsBtn"><i class="bi bi-check-lg"></i> ذخیره تنظیمات</button>
          </form>
        </div>
      </div>
    `;
    document.getElementById('saveSettingsBtn').addEventListener('click', save);
  }

  async function save() {
    const form = document.getElementById('settingsForm');
    const fd = new FormData(form);
    const data = Object.fromEntries(fd.entries());

    const file = form.querySelector('[name="logoFile"]').files[0];
    if (file) {
      data.logo = await Utils.fileToBase64(file);
    }
    delete data.logoFile;

    ['buildingName', 'manager', 'address', 'phone'].forEach(k => data[k] = Utils.sanitizeInput(data[k]));

    DB.saveSettings(data);
    Utils.showToast('تنظیمات ذخیره شد', 'success');
    App.applySettings();
  }

  return { render };
})();

/**
 * backup.js
 * پشتیبان‌گیری کامل و بازیابی اطلاعات از/به LocalStorage
 */

const Backup = (() => {

  function render() {
    const container = document.getElementById('page-backup');
    container.innerHTML = `
      <div class="page-header"><h4><i class="bi bi-cloud-arrow-down"></i> پشتیبان‌گیری</h4></div>
      <div class="row g-3">
        <div class="col-md-6">
          <div class="card h-100">
            <div class="card-body text-center">
              <i class="bi bi-download display-4 text-primary"></i>
              <h5 class="mt-3">تهیه فایل پشتیبان</h5>
              <p class="text-muted">خروجی کامل اطلاعات به صورت فایل JSON دانلود می‌شود.</p>
              <button class="btn btn-primary" id="btnExportBackup"><i class="bi bi-download"></i> دانلود پشتیبان</button>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card h-100">
            <div class="card-body text-center">
              <i class="bi bi-upload display-4 text-success"></i>
              <h5 class="mt-3">بازیابی اطلاعات</h5>
              <p class="text-muted">فایل پشتیبان قبلی را انتخاب کنید. اطلاعات فعلی جایگزین خواهد شد.</p>
              <input type="file" class="form-control mb-2" id="importBackupFile" accept="application/json">
              <button class="btn btn-success" id="btnImportBackup"><i class="bi bi-upload"></i> بازیابی</button>
            </div>
          </div>
        </div>
        <div class="col-12">
          <div class="card border-danger">
            <div class="card-body text-center">
              <h5 class="text-danger">پاک کردن کامل اطلاعات</h5>
              <p class="text-muted">تمام داده‌های ذخیره‌شده حذف و نرم‌افزار به حالت اولیه بازمی‌گردد.</p>
              <button class="btn btn-outline-danger" id="btnClearAll"><i class="bi bi-trash"></i> پاک‌سازی کامل</button>
            </div>
          </div>
        </div>
      </div>
    `;

    document.getElementById('btnExportBackup').addEventListener('click', exportBackup);
    document.getElementById('btnImportBackup').addEventListener('click', importBackup);
    document.getElementById('btnClearAll').addEventListener('click', clearAll);
  }

  function exportBackup() {
    const json = DB.exportBackup();
    const blob = new Blob([json], { type: 'application/json' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    const today = Utils.isoToJalaliDisplay(new Date().toISOString()).replace(/\//g, '-');
    link.download = `backup-charge-${today}.json`;
    link.click();
    Utils.showToast('فایل پشتیبان با موفقیت دانلود شد', 'success');
  }

  function importBackup() {
    const fileInput = document.getElementById('importBackupFile');
    const file = fileInput.files[0];
    if (!file) { Utils.showToast('لطفاً یک فایل انتخاب کنید', 'warning'); return; }

    Swal.fire({
      title: 'بازیابی اطلاعات',
      text: 'با ادامه، تمام اطلاعات فعلی جایگزین خواهد شد. آیا مطمئن هستید؟',
      icon: 'warning', showCancelButton: true, confirmButtonText: 'بله، بازیابی شود', cancelButtonText: 'انصراف'
    }).then(res => {
      if (!res.isConfirmed) return;
      const reader = new FileReader();
      reader.onload = () => {
        const success = DB.importBackup(reader.result);
        if (success) {
          Utils.showToast('اطلاعات با موفقیت بازیابی شد', 'success');
          App.applySettings();
          App.navigate('dashboard');
        } else {
          Utils.showToast('فایل پشتیبان نامعتبر است', 'error');
        }
      };
      reader.readAsText(file);
    });
  }

  function clearAll() {
    Swal.fire({
      title: 'پاک‌سازی کامل', text: 'این عملیات تمام اطلاعات را برای همیشه حذف می‌کند.', icon: 'error',
      showCancelButton: true, confirmButtonText: 'بله، پاک شود', cancelButtonText: 'انصراف', confirmButtonColor: '#dc3545'
    }).then(res => {
      if (res.isConfirmed) {
        DB.clearAll();
        Utils.showToast('تمام اطلاعات پاک شد', 'success');
        App.applySettings();
        App.navigate('dashboard');
      }
    });
  }

  return { render };
})();


/* ================= js/app.js ================= */
/**
 * app.js
 * کنترل‌کننده اصلی برنامه: مسیریابی بین صفحات، مدیریت تم، مودال‌ها و راه‌اندازی اولیه
 */

const App = (() => {
  const PAGES = ['dashboard', 'units', 'receipts', 'expenses', 'charges', 'ledger', 'reports', 'settings', 'backup'];
  let activeModal = null;

  function init() {
    if (!StorageManager.isStorageAvailable()) {
      showStorageWarning();
      return;
    }
    renderShell();
    applySettings();
    bindNav();
    navigate('dashboard');

    // جستجوی سراسری (نوار بالا)
    document.getElementById('globalSearch')?.addEventListener('input', Utils.debounce(handleGlobalSearch, 300));
    document.getElementById('themeToggleBtn')?.addEventListener('click', toggleTheme);
    document.getElementById('sidebarToggle')?.addEventListener('click', () => {
      document.querySelector('.app-sidebar').classList.toggle('show');
    });
  }

  /** پیام راهنما وقتی مرورگر اجازه ذخیره‌سازی محلی نمی‌دهد
   *  (معمولاً وقتی فایل HTML به‌صورت مستقیم/آفلاین یا در حالت خصوصی در سافاری آیفون باز شود) */
  function showStorageWarning() {
    document.body.innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
        font-family:Tahoma,sans-serif;direction:rtl;background:#f3f5f9;">
        <div style="max-width:480px;background:#fff;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center">
          <div style="font-size:40px;margin-bottom:12px">⚠️</div>
          <h4 style="margin-bottom:14px;color:#dc2626">امکان ذخیره‌سازی اطلاعات وجود ندارد</h4>
          <p style="color:#555;font-size:14.5px;line-height:2">
            مرورگر شما اجازه استفاده از حافظه محلی (LocalStorage) را در این حالت نمی‌دهد.
            این معمولاً زمانی رخ می‌دهد که فایل به‌صورت مستقیم (بدون میزبانی روی وب) یا در حالت
            مرور خصوصی (Private Browsing) در سافاری باز شده باشد.
          </p>
          <p style="color:#555;font-size:14.5px;line-height:2">
            برای رفع این مشکل:<br>
            ۱. حالت مرور خصوصی سافاری را خاموش کنید، یا<br>
            ۲. فایل را روی <b>GitHub Pages</b> یا هر هاست دیگری قرار دهید و از طریق آدرس
            <b>https://</b> آن را باز کنید (نه به‌صورت فایل محلی).
          </p>
        </div>
      </div>`;
  }

  function renderShell() {
    document.getElementById('appVersion') && (document.getElementById('appVersion').textContent = 'نسخه ۱.۰');
  }

  function bindNav() {
    document.querySelectorAll('.nav-link[data-page]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        navigate(link.dataset.page);
        document.querySelector('.app-sidebar').classList.remove('show');
      });
    });
  }

  function navigate(page) {
    if (!PAGES.includes(page)) page = 'dashboard';
    document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page)?.classList.add('active');
    document.querySelectorAll('.nav-link[data-page]').forEach(l => l.classList.toggle('active', l.dataset.page === page));

    const titleMap = {
      dashboard: 'داشبورد', units: 'مدیریت واحدها', receipts: 'دریافت‌ها', expenses: 'هزینه‌ها',
      charges: 'شارژ ماهانه', ledger: 'دفتر معین', reports: 'گزارشات', settings: 'تنظیمات', backup: 'پشتیبان‌گیری'
    };
    const titleEl = document.getElementById('pageTitle');
    if (titleEl) titleEl.textContent = titleMap[page] || '';

    switch (page) {
      case 'dashboard': Dashboard.render(); break;
      case 'units': Units.render(); break;
      case 'receipts': Receipts.render(); break;
      case 'expenses': Expenses.render(); break;
      case 'charges': Charges.render(); break;
      case 'ledger': Ledger.render(); break;
      case 'reports': Reports.render(); break;
      case 'settings': Settings.render(); break;
      case 'backup': Backup.render(); break;
    }
  }

  /* ------------------ مودال‌ها (Bootstrap) ------------------ */
  function mountModal(html, id) {
    closeModal(id);
    const wrapper = document.createElement('div');
    wrapper.innerHTML = html;
    document.getElementById('modalRoot').appendChild(wrapper.firstElementChild);
    const modalEl = document.getElementById(id);
    activeModal = new bootstrap.Modal(modalEl);
    modalEl.addEventListener('hidden.bs.modal', () => modalEl.remove());
    activeModal.show();
  }

  function closeModal(id) {
    const existing = document.getElementById(id);
    if (existing) {
      const inst = bootstrap.Modal.getInstance(existing);
      if (inst) inst.hide();
      existing.remove();
    }
  }

  /* ------------------ تم و تنظیمات ظاهری ------------------ */
  function applySettings() {
    const s = DB.getSettings();
    document.documentElement.style.setProperty('--primary-color', s.primaryColor || '#2563eb');
    document.getElementById('sidebarBuildingName') && (document.getElementById('sidebarBuildingName').textContent = s.buildingName || 'ساختمان نمونه');
    const logoEl = document.getElementById('sidebarLogo');
    if (logoEl) {
      if (s.logo) { logoEl.src = s.logo; logoEl.style.display = 'inline-block'; }
      else logoEl.style.display = 'none';
    }
    setTheme(s.theme || DB.getTheme() || 'light');
  }

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    DB.setTheme(theme);
    const icon = document.getElementById('themeIcon');
    if (icon) icon.className = theme === 'dark' ? 'bi bi-sun' : 'bi bi-moon-stars';
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    const next = current === 'light' ? 'dark' : 'light';
    setTheme(next);
    DB.saveSettings({ theme: next });
  }

  /* ------------------ جستجوی سراسری ------------------ */
  function handleGlobalSearch(e) {
    const q = e.target.value.trim();
    if (!q) return;
    // انتقال به صفحه واحدها با اعمال جستجو به عنوان ساده‌ترین رفتار سراسری
    navigate('units');
    setTimeout(() => {
      const input = document.getElementById('unitSearch');
      if (input) { input.value = q; input.dispatchEvent(new Event('input')); }
    }, 50);
  }

  return { init, navigate, mountModal, closeModal, applySettings, toggleTheme };
})();

document.addEventListener('DOMContentLoaded', () => {
  App.init();
});

</script>

</body>
</html>
